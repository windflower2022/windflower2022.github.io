    <h1>内边距</h1>
    <span id="more"></span>
    <div>
    元素内容周围产生空间，用padding顺序为上右下左。lenth以px,pt,cm等为单位指定边距；以父元素宽度的百分比指定边距。<br><br>
    元素具有指定宽度，加在上面的填充会加入总宽度。<br><br>
    width,height属性不包含内填充，边框和外边距的。<br><br>
    </div>
