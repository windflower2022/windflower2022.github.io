    div.box*3回车快速添加带有不同类名的div元素。<br><br>

    一定要设置祖父元素的高度如html,body：height: 100%;<br><br>
    代码简写时，background-size后要先添加位置，若没有指定位置就添加0px空格0px,再添加cover之类<br><br>
