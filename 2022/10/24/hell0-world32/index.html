     <div class="a">
       float:left

     <div class="b">
        float:left

     <div class="c">

     <!-- </div>-->
     <div class="d">
        float:left

   </div> 
     若四个元素，前三个都是浮动，第四个不是，<!--则在前三个前添加父元素。<br><br><br><br><br><br>
    普通元素，子元素大小可以将父元素撑开，但浮动元素未占据空间则不能将父元素撑开。故需为父元素设置高度<br><br>
    为使父元素高度保持正常，需给父元素增加样式：第一种overflow: auto;对于超出边界的元素，父元素可自动调整<br><br>
   第二种-->添加clear属性，可清除浮动 ，不想当前元素受到前面最近元素影响，就给当前元素添加clear中的: left/both/right;<br><br>
  <br><br><br>
