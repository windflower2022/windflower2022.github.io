<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z-index</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="one">
        盒子1
        <div class="two">
            盒子2
        </div>
        <div class="three">
            盒子3
        </div>
    </div>
    <div class="four">
        盒子4
    </div>
	<p>CSS也允许我们使用z-index属性把它放置在三维空间。坐标系x轴水平方向，轴代表垂直方向。值越大，离我们越近，同一空间中，越大的元素将覆盖越小的元素。</p>
	<p>容器的堆叠计算是先比较同级容器的，子容器不会超出父容器的堆叠顺序。</p>
</html>
