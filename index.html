        <!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>hello world</title>
 </head>
 <body>
1.<h2>hello world</h2>
<span id="more"></span>
2.单标签<br><br>
无论是出生、成长、相爱还是成功失败 ，<br>直到最后的最后，孤独犹如影子一样存在于生命一隅。<br>世界愈大，就愈感到孤独。年纪越大，就愈感到孤单。<br><br>
3.双标签<br>
<h3>心情就像窗外天色</h3>
4.标签属性
双标签属性，写在开标签里
<h3 title="孤独风花"> 心情就像窗外天色</h3>  
单标签属性，写在自身.<br><br>
<img src="https://s1.ax1x.com/2022/09/02/vIbNjK.jpg"><br><br><br>
5.HTML基本格式
&nbsp;&nbsp;<!DOCTYPEhtml> <br><br>!DOCTYPEhtml浏览器按HTML5语法进行规范解析
&nbsp;&nbsp;<html lang="en"> <br><br>html包含了页面的所有内容，称为根元素
&nbsp;&nbsp;<head><br><br>head所有头部元素的容器，描述了文档的各种属性和信息，比如文档的标题，文档引用的样式表，js脚本文件等信息。绝大多数文档头部包含的数据都不会真正作为内容显示给浏览者。
&nbsp;&nbsp;<meta charset="UTF-8">  <br><br>meta charset="UTF-8"设置字符集UTF-8它包括了书面语言的大多数字符，基本上可以处理放在页面上的任何文本内容。
&nbsp;&nbsp;<title> HTML基本格式</title> <br><br>title设置了页面的标题，即出现在浏览器标签上的内容。也被用来描述页面被家人书签或收藏时的标题。
</head>
&nbsp;&nbsp;<body><br><br>body包含了页面展示的所有内容，如文字，图片，视频，游戏，可播放的音乐等。一般情况下，一个符合规范的html文档，都应该使用这个基本格式。
<h3>心情就像窗外天色</h3>  
</body>
&nbsp;&nbsp;小提示：<br><br>编写HTML,可空白页！，再+Tab,便自动生成格式。<br><br>
标签前有无空格，是因标签嵌套。一个标签里再写一个标签，形成包裹关系，父子标签，需保持固定缩进，一般采用2个，或4个。子标签比父标签多一套缩进。  <br><br>
6.文本标题和段落标签<br><br>
&nbsp;&nbsp;A.标题标签h有6个，1级-6级（h1-h6）
<h1>孤独风花</h1>
<h2>孤独风花</h2>  
<h3>孤独风花</h3> 
<h4>孤独风花</h4> 
<h5>孤独风花</h5>
<h6>孤独风花</h6>
&nbsp;&nbsp;B.段落标签p<br><br>默认左-右，段落间有间距。&nbsp;表1个缩进， 多少个&nbsp;就多少个缩进。
<p>
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;心情就像窗外天色，一个人的孤独不是孤独，一个人找另一个人，一句话找另一句话，才是真正的孤独。孤独像状态，寂寞似心境。
</p>
<p>
    &nbsp;&nbsp;&nbsp;&nbsp;无论是出生、成长、相爱还是成功失败 ，直到最后的最后，孤独犹如影子一样存在于生命一隅。
</p>
<p> 
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;世界愈大，就愈感到孤独。年纪越大，就愈感到孤单。生命从来不曾离开过孤独而独立存在。在孤独中成长，也在孤独中疗伤。
</p><br><br> 
&nbsp;&nbsp;C.居中标签align=""
<br><br>&nbsp;&nbsp;文章设置
<h1 align="center">孤独风花</h1>
<h4 align="center">——— 上善若水《孤独》</h4>
<p>
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;心情就像窗外天色，一个人的孤独不是孤独，一个人找另一个人，一句话找另一句话，才是真正的孤独。孤独像状态，寂寞似心境。
</p>
<h3>&nbsp;——— 上善若水《孤独》</h3>
<p>
    &nbsp;&nbsp;&nbsp;&nbsp;无论是出生、成长、相爱还是成功失败 ，直到最后的最后，孤独犹如影子一样存在于生命一隅。
</p>
<h3>&nbsp;——— 上善若水《孤独》</h3>
<p>
    &nbsp;&nbsp;&nbsp;&nbsp;无论是出生、成长、相爱还是成功失败 ，直到最后的最后，孤独犹如影子一样存在于生命一隅。
</p><br>
 &nbsp;&nbsp;注意标签的嵌套。<br><br>
 7.图片标签img,src(source)属性<br><br>
 <img src="https://s1.ax1x.com/2022/09/02/vIbNjK.jpg">
 <br><br>&nbsp;&nbsp;相对路径：文件和文件夹的关系，确定文件查找路径。
 <br><br>&nbsp;&nbsp;&nbsp;&nbsp;a.页面文件和图片文件同级关系，直接使用"图片名"。
 <br><br><img src="by.jpg">
 <br><br>&nbsp;&nbsp;&nbsp;&nbsp;b.页面和图片所在文件夹同级关系，"文件夹名/图片名"
 <br><br><img src="img\by.jpg">
 <br><br>&nbsp;&nbsp;&nbsp;&nbsp;c.页面所在文件夹和图片所在文件夹为同级关系，"../img/图片名”
 <br><br>&nbsp;&nbsp;绝对路径：网上直接网址；电脑上找到图片，地址栏全部拷贝物理路径即可。
 <br><br><img src="E:\FS\picture\grey.jpg">
 <br><br>&nbsp;&nbsp;图片破损，添加属性alt，文字说明
 <br><br>&nbsp;&nbsp;<img src="img\b.jpg" alt="文字说明">
 <br><br>&nbsp;&nbsp;<img src="img\b.jpg" alt="文字说明" title="孤独风花">
 <br><br>&nbsp;&nbsp;图片标签拓展
 <br><br>&nbsp;&nbsp;图片格式名
 <br><br>&nbsp;&nbsp;超链接a(anchor)
 <br><br><a href="目标页面地址"></a>
 <body>
<a href="https://windflower2022.github.io">孤独风花</a>
<a href="https://windflower2022.github.io" target="">孤独风花</a> _self代表在当前页面打开，_blank在空白页面打开
<a>孤独风花</a>
<br><br>&nbsp;&nbsp;锚点链接
<br><br>&nbsp;&nbsp;a.跳转目标的定义 ,名字不得重复。
<br><br>&nbsp;&nbsp;<p id=""box1">
</p>
<br><br>&nbsp;&nbsp;<p id=""box2">
</p>
<br><br>&nbsp;&nbsp;<p id=""box3">


</p>
<br><br>&nbsp;&nbsp;b.锚点的定义
<br><br>&nbsp;&nbsp;&nbsp;&nbsp;a标签定义链接属性来定义
<p align="center">
    <a href="#box1">孤独风花</a>
    <a href="#box2">风花雪月</a>
</p>
<p align="center" id="box1">
    <img src="https://s1.ax1x.com/2022/09/02/vIbNjK.jpg" alt="">
</p>
<p align="center" id="box2">
    <img src="https://s1.ax1x.com/2022/09/08/vb295q.png" alt="">
</p><br><br>&nbsp;&nbsp;c.文本标签的修饰
<br><br>&nbsp;&nbsp;b(body),strong双标签，都是加粗文本,后者语义更强，表该文本很重要。
<br><br><b>孤独风花</b>
<br><br><strong>雪月风花</strong>
<p>风花雪月</p>
&nbsp;&nbsp;i(italic)，em(emphasize)斜体双标签，后者加强语义
<br><br><i>孤独风花</i>
<br><br><em>风花雪月</em>
<br><br>&nbsp;&nbsp;s(strike),del(delete)删除双标签，前者html5不支持了。
<br><br><s>孤独风花</s>
<br><br><del>风花雪月</del>
<br><br>&nbsp;&nbsp;u(underline)添加下划线双标签
<br><br><u>孤独风花</u>
<br><br>&nbsp;&nbsp;sup(superscript),sub(subscript)上下角标双标签
<br><br>孤独风<sup>花</sup>
<br><br>风<sub>花</sub>雪月

<br><br>列表标签：有序列表，无序列表，自定义列表标签。
<br><br>&nbsp;&nbsp;有序列表双标签：ol(order list)有序列表,只嵌套li（list item）列表，为父子关系，会生成123.。。符号，称为项目符号。有其它，只能在li里嵌套。
 <!-- 这是有序列表的介绍 -->
 <ol >
    <li>把冰箱门打开</li>
    <li>把大象放进去</li>
    <li>把冰箱门关上</li>
</ol>
<br><br>有序项目符号可设置，在ol里面添加type属性，A，a,(英文顺序）I,i,（罗马数字顺序）1（阿拉伯数字顺序）
<ol type=""></ol>
<ol type="A">
    <li>把冰箱门打开</li>
    <li>把大象放进去</li>
    <li>把冰箱门关上</li>
</ol>
<br><br>改变数字序号，可以把type变成start
<ol type="A" start="6">
    <li>把冰箱门打开</li>
    <li>把大象放进去</li>
    <li>把冰箱门关上</li>
</ol>
<br><br>&nbsp;&nbsp;无序列表双标签ul(unorder list)，只能嵌套li标签：指列表项内容，无时间，空间，逻辑等顺序要求。项目符号和有序列表的不一致。
<ul>
    <li>水壶水开了，不及时处理就会溢出来</li>
    <li>家里的电话响了，很可能有急事</li>
    <li>孩子睡醒了，很能需要换尿布</li>
</ul>
<br><br>换顺序，将光标定在某行，按住Alt,点击↑↓就可交换顺序。
<br><br>在ul里面添加type属性:disc(实心圆点)，circle（空心圆）square(实心方块)none(隐藏)
<ul type="circle">
    <li>水壶水开了，不及时处理就会溢出来</li>
    <li>家里的电话响了，很可能有急事</li>
    <li>孩子睡醒了，很能需要换尿布</li>
</ul>
<br><br>&nbsp;&nbsp;自定义列表双标签:父标签dl(definition list)定义列表,子标签dt(definition term)定义术语,dd(definition discription)定义描述,后两者互为兄弟关系，只能在dl下，dd可多个
<dl>
    <dt>问：你来自哪里</dt>
    <dd>答：中国</dd>
</dl>
<dl>
    <dt>科代表</dt>
    <dd>张三</dd>
    <dd>李四</dd>
    <dd>王麻子</dd>
</dl>
