         function fn(a) { 
            a++; 
            console.log(a); // 11 
        } 
        var x = 10; 
        fn(x); 
        console.log(x); 

<pre><code>    function person(name) &#123;
        this.name = name;
    &#125;
    function f1(x) &#123; // x = p
        console.log(x.name); // 2. 这个输出是什么 刘德华
        x.name = &quot;张学友&quot;;
        console.log(x.name); // 3. 这个输出是什么 张学友

        <h2>目标</h2>
        <span id="more"></span>
        能说出简单数据类型的内存分配</br></br>
        能说出复杂数据类型的内存分配</br></br>
        能够说出简单类型如何传参</br></br>
        能输出复杂类型如何传参</br></br>
        <h2>目录</h2>
        简单类型与复杂类型</br></br>
        堆和栈</br></br>
        简单类型的内存分配</br></br>
        复杂类型的内存分配</br></br>
        简单类型传参</br></br>
        复杂类型传参</br></br>
        <h4>1. 简单数据类型和复杂数据类型</h4>
        简单类型又叫作数据基本类型或者值类型,复杂类型又叫做引用类型</br></br>
        值类型：简单数据类型/基本数据类型,在存储时变量中存储的是值本身,因此叫做值类型</br></br>
        string, number, boolean, undefined,null</br></br>
        引用类型:复杂数据类型,在存储时变量中存储的仅仅时地址(引用),因此叫做引用数据类型</br></br>
        通过new关键字创建的对象(系统对象、自定义对象),如object, Array, Date等</br></br>
        简单数据类型 null 返回的是一个空的对象 object </br></br>
        var timer = null;</br></br>
        console.log(typeOf timer);</br></br>
        如果有个变量我们以后打算储存为对象 暂时没想好放啥 这个时候就给null</br></br>
        <h4>2. 堆和栈</h4>
        1) 简单数据类型存于栈,里面直接开辟一个空间，存的是一个值</br></br>
        2) 复杂数据类型 首先在栈里面存放地址 十六进制表示 然后这个地址指向堆里面的数据</br></br>
        <h4>3. 简单类型传参</h4>
        函数的形参也看作是一个变量,当我们把一个值类型变量作为参数传给函数的形参时,其实是把变量在栈空间里的值复制了一份给形参,那么在方法内部对形参做任何修改,都不会影响到的外部变量</br></br>
        function fn(a) { </br></br>
            a++; </br></br>
            console.log(a); // 11 </br></br>
        } </br></br>
        var x = 10; </br></br>
        fn(x); </br></br>
        console.log(x); // 10 </br></br>
        <h4>3. 复杂类型传参</h4>
        函数的形参也可以看做是一个变量,当我们把引用类型变量传给形参时,其实是把变量在栈空间里保存的堆地址复制给了形参,形参和实参其实保存的是同一个堆地址，所以操作的是同一个对象</br></br>
        function person(name) { </br></br>
            this.name = name; </br></br>
        } </br></br>
        function f1(x) { // x = p </br></br>
            console.log(x.name); // 2. 这个输出是什么 </br></br>
            x.name = "张学友"; </br></br>
            console.log(x.name); // 3. 这个输出是什么 </br></br>
        } </br></br>
        var p = new person("刘德华"); </br></br>
        console.log(p.name);  // 1. 这个输出是什么 </br></br>
        f1(p); </br></br>
        console.log(p.name); // 4. 这个输出是什么 </br></br>
