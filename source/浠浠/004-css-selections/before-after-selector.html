        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>before_after_selector</title>
    <style>
        div {
            width: 600px;
            height: 500px;
            background-color: rgb(161, 181, 199);
        }

        div::before {
            content: "我喜欢这句话";  
            font-size: 20px;
            color: green;  
        }  
        
        div::after {
            content: "《你若盛开 蝴蝶自来》用从容而舒缓的语言，将女人自我经营的智慧娓娓道来，轻柔地提醒世间所有热爱生命、热爱美好生活的女性，要用微笑来经营生活，用真诚来经营情感，用宽容来经营人际，用淡定来经营心灵。你若盛开，蝴蝶自来。你若精彩，天自安排。愿女性朋友们能够一起努力完善自己，创造自然的吸引力。";
            font-size: 20px;
            color: green;
        } 
    </style>
</head>
<body>   
    <div>
        你若盛开，蝴蝶自来。
        我们生命中的一切所愿，其实不应该用"追求"，而应该用"吸引"。在浮躁而慌乱的世界里，让自己活成一株温婉优雅的玫瑰，让生命吐露芬芳，你所追求的一切才会款款而来。
    </div>
</body>
